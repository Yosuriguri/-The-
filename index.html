<!DOCTYPE html>

    <style>
        body {
            font-family: 'Noto Sans KR', sans-serif;
        }
        .slide-content {
            transition: opacity 0.3s ease-in-out;
        }
        @keyframes bounce-slow {
            0%, 100% { transform: translateY(-5%); animation-timing-function: cubic-bezier(0.8, 0, 1, 1); }
            50% { transform: translateY(0); animation-timing-function: cubic-bezier(0, 0, 0.2, 1); }
        }
        .animate-bounce-slow {
            animation: bounce-slow 2s infinite;
        }
    </style>
</head>
<body class="bg-slate-200 text-slate-900">

    <div id="app" class="min-h-screen flex flex-col items-center justify-center p-4 overflow-hidden">
        <!-- PPT Container -->
        <div id="ppt-container" class="w-full max-w-5xl aspect-[16/9] shadow-2xl rounded-3xl overflow-hidden flex flex-col relative transition-all duration-500 bg-white">
            
            <!-- Header -->
            <div class="p-6 md:p-8 pb-0 flex justify-between items-start z-20">
                <div>
                    <p class="text-blue-600 font-bold tracking-widest text-xs md:text-sm mb-1 uppercase">Samsung Life Insurance</p>

            </div>

            <div id="slide-content" class="flex-1 px-8 md:px-12 py-4 overflow-hidden z-10 slide-content">
                <!-- HTML content will be injected here -->
            </div>

            <!-- Navigation Arrows (Desktop) -->
            <div class="hidden md:block">
                <button onclick="prevSlide()" id="prev-arrow" class="absolute left-4 top-1/2 -translate-y-1/2 p-4 rounded-full bg-white/80 shadow-lg text-slate-400 hover:text-blue-600 hover:scale-110 transition-all z-30">
                    <i data-lucide="chevron-left" class="w-8 h-8"></i>
                </button>
                <button onclick="nextSlide()" id="next-arrow" class="absolute right-4 top-1/2 -translate-y-1/2 p-4 rounded-full bg-white/80 shadow-lg text-slate-400 hover:text-blue-600 hover:scale-110 transition-all z-30">
                    <i data-lucide="chevron-right" class="w-8 h-8"></i>
                </button>
            </div>

            <!-- Footer Progress Bar -->
            <div class="h-2 bg-slate-100 w-full flex mt-auto z-20">
                <div id="progress-bar" class="h-full bg-blue-600 transition-all duration-500 ease-out" style="width: 0%"></div>
            </div>
        </div>

        <!-- Controller Buttons -->
        <div class="mt-8 flex flex-wrap justify-center gap-4 md:gap-6">
            <button onclick="prevSlide()" id="prev-btn" class="bg-white px-5 py-3 rounded-xl shadow-md hover:bg-slate-50 transition-colors font-semibold text-slate-600 flex items-center gap-2">
                <i data-lucide="chevron-left" class="w-5 h-5"></i> 이전
            </button>
            <div id="dot-navigation" class="flex gap-2 items-center">
                <!-- Dots will be injected here -->
            </div>
            <button onclick="nextSlide()" id="next-btn" class="bg-blue-600 text-white px-5 py-3 rounded-xl shadow-md hover:bg-blue-700 transition-colors font-semibold flex items-center gap-2">
                다음 <i data-lucide="chevron-right" class="w-5 h-5"></i>

        </div>

        </p>
    </div>
