        function renderSlide() {
            const slide = slides[currentSlide];
            const contentEl = document.getElementById('slide-content');
            
            // Fade out effect
            contentEl.style.opacity = 0;
            
            setTimeout(() => {
                // Update text
                document.getElementById('slide-title').innerText = slide.title;
                document.getElementById('slide-subtitle').innerText = slide.subtitle;
                document.getElementById('page-indicator').innerText = `${currentSlide + 1} / ${slides.length}`;
                
                // Update content
                contentEl.innerHTML = slide.content;
                
                // Update background
                const container = document.getElementById('ppt-container');
                container.className = `w-full max-w-5xl aspect-[16/9] shadow-2xl rounded-3xl overflow-hidden flex flex-col relative transition-all duration-500 ${slide.bg || 'bg-white'}`;
                
                // Update progress bar
                const progress = ((currentSlide + 1) / slides.length) * 100;
                document.getElementById('progress-bar').style.width = `${progress}%`;
                
                // Update dots
                renderDots();
                
                // Update button states
                document.getElementById('prev-arrow').style.opacity = currentSlide === 0 ? 0 : 1;
                document.getElementById('prev-arrow').disabled = currentSlide === 0;
                document.getElementById('next-arrow').style.opacity = currentSlide === slides.length - 1 ? 0 : 1;
                document.getElementById('next-arrow').disabled = currentSlide === slides.length - 1;
                
                document.getElementById('prev-btn').disabled = currentSlide === 0;
                document.getElementById('prev-btn').style.opacity = currentSlide === 0 ? 0.5 : 1;
                document.getElementById('next-btn').disabled = currentSlide === slides.length - 1;
                document.getElementById('next-btn').style.opacity = currentSlide === slides.length - 1 ? 0.5 : 1;
                
                // Fade in effect
                contentEl.style.opacity = 1;
                
                // Re-initialize Lucide icons for new content
                lucide.createIcons();
            }, 150);
        }

        function renderDots() {
            const dotNav = document.getElementById('dot-navigation');
            dotNav.innerHTML = '';
            slides.forEach((_, idx) => {
                const dot = document.createElement('div');
                dot.className = `cursor-pointer transition-all rounded-full ${idx === currentSlide ? 'bg-blue-600 w-8 h-3' : 'bg-slate-400 hover:bg-slate-500 w-3 h-3'}`;
                dot.onclick = () => {
                    currentSlide = idx;
                    renderSlide();
                };
                dotNav.appendChild(dot);
            });
        }

        function nextSlide() {
            if (currentSlide < slides.length - 1) {
                currentSlide++;
                renderSlide();
            }
        }

        function prevSlide() {
            if (currentSlide > 0) {
                currentSlide--;
                renderSlide();
            }
        }

        // Keyboard navigation
        document.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowRight') nextSlide();
            if (e.key === 'ArrowLeft') prevSlide();
        });

        // Initialize first slide
        window.onload = () => {
            renderSlide();
        };
    </script>
</body>
</html>
